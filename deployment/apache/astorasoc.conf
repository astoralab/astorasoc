<VirtualHost *:80>
    ServerName astorasoc.example.com

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass / http://127.0.0.1:5001/
    ProxyPassReverse / http://127.0.0.1:5001/

    ErrorLog ${APACHE_LOG_DIR}/astorasoc-error.log
    CustomLog ${APACHE_LOG_DIR}/astorasoc-access.log combined
</VirtualHost>

# Production HTTPS example:
#
# <VirtualHost *:443>
#     ServerName astorasoc.example.com
#
#     SSLEngine on
#     SSLCertificateFile /etc/letsencrypt/live/astorasoc.example.com/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/astorasoc.example.com/privkey.pem
#
#     ProxyPreserveHost On
#     ProxyRequests Off
#
#     RequestHeader set X-Forwarded-Proto "https"
#     RequestHeader set X-Forwarded-Port "443"
#
#     ProxyPass / http://127.0.0.1:5001/
#     ProxyPassReverse / http://127.0.0.1:5001/
#
#     Header always set X-Content-Type-Options "nosniff"
#     Header always set Referrer-Policy "strict-origin-when-cross-origin"
#     Header always set X-Frame-Options "SAMEORIGIN"
#
#     ErrorLog ${APACHE_LOG_DIR}/astorasoc-ssl-error.log
#     CustomLog ${APACHE_LOG_DIR}/astorasoc-ssl-access.log combined
# </VirtualHost>
